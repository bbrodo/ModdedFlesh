name: Build Release Zip

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create release folder
        run: |
          mkdir release
          cp manifest.json release/
          cp *.xdelta release/

      - name: Zip release files
        run: |
          cd release
          zip -r "../ModdedFlesh${{ github.ref_name }}.zip" .
      
      - name: Extract changelog section
        run: |
          awk '
            /^## / {
              if (found) exit
              if ($0 ~ tag) found=1
            }
            found { print }
          ' tag="${{ github.ref_name }}" CHANGELOG.md > RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" "ModdedFlesh${{ github.ref_name }}.zip" \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md